<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crossword</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
  }

  h1 {
    margin-top: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 50px);
    grid-gap: 2px;
    justify-content: center;
    margin-top: 30px;
  }

  input {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 22px;
    text-transform: uppercase;
    border: 1px solid #333;
  }

  .black {
    background: black;
    pointer-events: none;
  }

  button {
    margin-top: 20px;
    padding: 10px 15px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h1>Crossword Puzzle</h1>

<div class="grid" id="grid"></div>

<button onclick="checkAnswers()">Check Answers</button>

<script>
// 5x5 crossword layout
// "_" = letter box, "#" = black square
const puzzle = [
  ["H","E","L","L","O"],
  ["A","#","#","#","A"],
  ["P","L","A","N","E"],
  ["P","#","#","#","T"],
  ["Y","E","S","S","S"]
];

// correct answers (same as puzzle for now)
const answers = puzzle;

const grid = document.getElementById("grid");

// build grid
for (let r = 0; r < puzzle.length; r++) {
  for (let c = 0; c < puzzle[r].length; c++) {

    const cell = document.createElement("input");

    if (puzzle[r][c] === "#") {
      cell.classList.add("black");
      cell.disabled = true;
      cell.value = "";
    } else {
      cell.maxLength = 1;
      cell.dataset.answer = answers[r][c];
    }

    grid.appendChild(cell);
  }
}

// check answers
function checkAnswers() {
  const inputs = document.querySelectorAll("input:not(.black)");
  inputs.forEach(input => {
    if (input.value.toUpperCase() === input.dataset.answer) {
      input.style.backgroundColor = "lightgreen";
    } else {
      input.style.backgroundColor = "salmon";
    }
  });
}
</script>

</body>
</html>
